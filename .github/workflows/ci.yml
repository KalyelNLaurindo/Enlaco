name: Enlaço Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, dev, feature/* ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Typecheck TypeScript
        run: npm run typecheck || npx tsc --project tsconfig.app.json --noEmit

      - name: Run Test Suite
        run: npm run test -- run --reporter=verbose

      - name: Build Application
        run: npm run build
